<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 1320" style="background:#fafaf8;font-family:system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LAYER 0 — INPUT -->
  <rect x="40" y="20" width="780" height="52" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="430" y="41" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Input bar — Gradio UI</text>
  <text x="430" y="60" text-anchor="middle" font-size="12" fill="#0f6e56">Nepali · English · mixed — free text, no structure required</text>

  <line x1="430" y1="72" x2="430" y2="96" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LAYER 1 — SAFETY HARNESS -->
  <rect x="40" y="96" width="780" height="108" rx="10" fill="#fcebeb" stroke="#a32d2d" stroke-width="0.8"/>
  <text x="430" y="117" text-anchor="middle" font-size="14" font-weight="600" fill="#501313">Safety harness</text>

  <rect x="56" y="128" width="228" height="60" rx="6" fill="#f1efe8" stroke="#888" stroke-width="0.5"/>
  <text x="170" y="151" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Input sanitiser</text>
  <text x="170" y="168" text-anchor="middle" font-size="11" fill="#5f5e5a">length · encoding · lang detect</text>

  <rect x="306" y="128" width="228" height="60" rx="6" fill="#f1efe8" stroke="#888" stroke-width="0.5"/>
  <text x="420" y="151" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">PII guard</text>
  <text x="420" y="168" text-anchor="middle" font-size="11" fill="#5f5e5a">flag NID · phone · address</text>

  <rect x="556" y="128" width="228" height="60" rx="6" fill="#f1efe8" stroke="#888" stroke-width="0.5"/>
  <text x="670" y="151" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Consent check</text>
  <text x="670" y="168" text-anchor="middle" font-size="11" fill="#5f5e5a">confirm before storing</text>

  <line x1="430" y1="204" x2="430" y2="228" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LAYER 2 — ORCHESTRATOR -->
  <rect x="40" y="228" width="780" height="64" rx="10" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="430" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#26215c">Orchestrator</text>
  <text x="430" y="272" text-anchor="middle" font-size="11" fill="#3c3489">session state · profile selector · turn counter · retry budget · timeout watchdog</text>

  <line x1="430" y1="292" x2="430" y2="316" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LAYER 3 — LLAMA.CPP ENGINE -->
  <rect x="40" y="316" width="780" height="272" rx="12" fill="#faeeda" stroke="#854f0b" stroke-width="0.8"/>
  <text x="430" y="340" text-anchor="middle" font-size="14" font-weight="600" fill="#412402">llama.cpp inference engine — one model, one instance</text>

  <!-- model identity -->
  <rect x="56" y="350" width="748" height="36" rx="6" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="430" y="363" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Qwen2.5-7B-Instruct · Q4_K_M GGUF · fine-tuned LoRA adapter</text>
  <text x="430" y="378" text-anchor="middle" font-size="11" fill="#5f5e5a">loaded once at startup — never swapped out · one llama.cpp server process</text>

  <!-- optimizations label -->
  <text x="56" y="406" font-size="11" fill="#854f0b" font-weight="600">llama.cpp optimizations</text>

  <rect x="56" y="414" width="168" height="60" rx="5" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="140" y="436" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">KV cache</text>
  <text x="140" y="452" text-anchor="middle" font-size="11" fill="#0f6e56">reuse session context</text>
  <text x="140" y="466" text-anchor="middle" font-size="11" fill="#0f6e56">skip re-encoding turns</text>

  <rect x="238" y="414" width="168" height="60" rx="5" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="322" y="436" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">GPU offload</text>
  <text x="322" y="452" text-anchor="middle" font-size="11" fill="#0f6e56">Metal (Mac) / CUDA</text>
  <text x="322" y="466" text-anchor="middle" font-size="11" fill="#0f6e56">n_gpu_layers flag</text>

  <rect x="420" y="414" width="168" height="60" rx="5" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="504" y="436" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Mlock + mmap</text>
  <text x="504" y="452" text-anchor="middle" font-size="11" fill="#0f6e56">pin weights in RAM</text>
  <text x="504" y="466" text-anchor="middle" font-size="11" fill="#0f6e56">no page-fault stalls</text>

  <rect x="602" y="414" width="192" height="60" rx="5" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="698" y="436" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Prompt cache</text>
  <text x="698" y="452" text-anchor="middle" font-size="11" fill="#0f6e56">system prompt prefix</text>
  <text x="698" y="466" text-anchor="middle" font-size="11" fill="#0f6e56">cached across calls</text>

  <!-- inference profiles label -->
  <text x="56" y="494" font-size="11" fill="#854f0b" font-weight="600">Inference profiles — orchestrator selects per agent call</text>

  <rect x="56" y="502" width="120" height="68" rx="5" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="116" y="522" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">extract</text>
  <text x="116" y="538" text-anchor="middle" font-size="11" fill="#3c3489">80 tokens</text>
  <text x="116" y="553" text-anchor="middle" font-size="11" fill="#3c3489">temp 0.1</text>
  <text x="116" y="566" text-anchor="middle" font-size="11" fill="#3c3489">JSON stop</text>

  <rect x="192" y="502" width="120" height="68" rx="5" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="252" y="522" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">question</text>
  <text x="252" y="538" text-anchor="middle" font-size="11" fill="#3c3489">60 tokens</text>
  <text x="252" y="553" text-anchor="middle" font-size="11" fill="#3c3489">temp 0.7</text>
  <text x="252" y="566" text-anchor="middle" font-size="11" fill="#3c3489">stop at ?</text>

  <rect x="328" y="502" width="120" height="68" rx="5" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="388" y="522" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">structure</text>
  <text x="388" y="538" text-anchor="middle" font-size="11" fill="#3c3489">300 tokens</text>
  <text x="388" y="553" text-anchor="middle" font-size="11" fill="#3c3489">temp 0.3</text>
  <text x="388" y="566" text-anchor="middle" font-size="11" fill="#3c3489">JSON mode</text>

  <rect x="464" y="502" width="120" height="68" rx="5" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="524" y="522" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">reconcile</text>
  <text x="524" y="538" text-anchor="middle" font-size="11" fill="#3c3489">120 tokens</text>
  <text x="524" y="553" text-anchor="middle" font-size="11" fill="#3c3489">temp 0.2</text>
  <text x="524" y="566" text-anchor="middle" font-size="11" fill="#3c3489">flag mode</text>

  <rect x="600" y="502" width="194" height="68" rx="5" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="697" y="522" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">publish</text>
  <text x="697" y="538" text-anchor="middle" font-size="11" fill="#3c3489">500 tokens</text>
  <text x="697" y="553" text-anchor="middle" font-size="11" fill="#3c3489">temp 0.4</text>
  <text x="697" y="566" text-anchor="middle" font-size="11" fill="#3c3489">narrative mode</text>

  <line x1="430" y1="588" x2="430" y2="612" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LAYER 4 — AGENT SWARM -->
  <rect x="40" y="612" width="780" height="248" rx="12" fill="#f1efe8" stroke="#888" stroke-width="0.8"/>
  <text x="430" y="634" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2a">Agent swarm — all agents call the same model via profiled inference</text>

  <!-- narrative layer -->
  <text x="56" y="654" font-size="11" fill="#993c1d" font-weight="600">Narrative layer</text>

  <rect x="56" y="662" width="220" height="60" rx="6" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="166" y="684" text-anchor="middle" font-size="13" font-weight="600" fill="#4a1b0c">Arc detector</text>
  <text x="166" y="700" text-anchor="middle" font-size="11" fill="#993c1d">setup · tension · turn · meaning</text>
  <text x="166" y="714" text-anchor="middle" font-size="11" fill="#993c1d">extract profile · 60 tok</text>

  <rect x="296" y="662" width="228" height="60" rx="6" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="410" y="684" text-anchor="middle" font-size="13" font-weight="600" fill="#4a1b0c">Emotion anchor</text>
  <text x="410" y="700" text-anchor="middle" font-size="11" fill="#993c1d">named vs unnamed feeling</text>
  <text x="410" y="714" text-anchor="middle" font-size="11" fill="#993c1d">extract profile · 80 tok</text>

  <rect x="544" y="662" width="260" height="60" rx="6" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="674" y="684" text-anchor="middle" font-size="13" font-weight="600" fill="#4a1b0c">Cultural context</text>
  <text x="674" y="700" text-anchor="middle" font-size="11" fill="#993c1d">jatra · ritual · deity · season</text>
  <text x="674" y="714" text-anchor="middle" font-size="11" fill="#993c1d">lookup table + extract</text>

  <!-- processing layer -->
  <text x="56" y="742" font-size="11" fill="#534ab7" font-weight="600">Processing layer</text>

  <rect x="56" y="750" width="168" height="60" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="140" y="772" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">Extractor</text>
  <text x="140" y="788" text-anchor="middle" font-size="11" fill="#3c3489">who · what · when</text>
  <text x="140" y="802" text-anchor="middle" font-size="11" fill="#3c3489">extract profile</text>

  <rect x="244" y="750" width="168" height="60" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="328" y="772" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">Questioner</text>
  <text x="328" y="788" text-anchor="middle" font-size="11" fill="#3c3489">one question only</text>
  <text x="328" y="802" text-anchor="middle" font-size="11" fill="#3c3489">question profile</text>

  <rect x="432" y="750" width="168" height="60" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="516" y="772" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">Structurer</text>
  <text x="516" y="788" text-anchor="middle" font-size="11" fill="#3c3489">atomic notes out</text>
  <text x="516" y="802" text-anchor="middle" font-size="11" fill="#3c3489">structure profile</text>

  <rect x="620" y="750" width="184" height="60" rx="6" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text x="712" y="772" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Reconciler</text>
  <text x="712" y="788" text-anchor="middle" font-size="11" fill="#854f0b">conflict detection</text>
  <text x="712" y="802" text-anchor="middle" font-size="11" fill="#854f0b">reconcile profile</text>

  <!-- scratchpad -->
  <rect x="56" y="828" width="748" height="26" rx="4" fill="#d3d1c7" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="430" y="844" text-anchor="middle" font-size="11" fill="#444441">24hr scratchpad — low-confidence fragments held pending confirmation</text>

  <line x1="430" y1="860" x2="430" y2="884" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LAYER 5 — VERIFICATION -->
  <rect x="40" y="884" width="780" height="116" rx="12" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.8"/>
  <text x="430" y="906" text-anchor="middle" font-size="14" font-weight="600" fill="#042c53">Verification pipeline</text>

  <rect x="56" y="916" width="228" height="68" rx="6" fill="#f1efe8" stroke="#888" stroke-width="0.5"/>
  <text x="170" y="938" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Fact checker</text>
  <text x="170" y="954" text-anchor="middle" font-size="11" fill="#5f5e5a">cross-ref existing notes</text>
  <text x="170" y="970" text-anchor="middle" font-size="11" fill="#5f5e5a">flag contradictions</text>

  <rect x="306" y="916" width="228" height="68" rx="6" fill="#f1efe8" stroke="#888" stroke-width="0.5"/>
  <text x="420" y="938" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Confidence scorer</text>
  <text x="420" y="954" text-anchor="middle" font-size="11" fill="#5f5e5a">confirmed · pending · disputed</text>
  <text x="420" y="970" text-anchor="middle" font-size="11" fill="#5f5e5a">routes to correct tier</text>

  <rect x="556" y="916" width="228" height="68" rx="6" fill="#f1efe8" stroke="#888" stroke-width="0.5"/>
  <text x="670" y="938" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Consent gate</text>
  <text x="670" y="954" text-anchor="middle" font-size="11" fill="#5f5e5a">user confirms before write</text>
  <text x="670" y="970" text-anchor="middle" font-size="11" fill="#5f5e5a">SQLite commit only on ok</text>

  <line x1="430" y1="1000" x2="430" y2="1024" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LAYER 6 — MEMORY MANAGEMENT -->
  <rect x="40" y="1024" width="780" height="188" rx="12" fill="#eaf3de" stroke="#3b6d11" stroke-width="0.8"/>
  <text x="430" y="1048" text-anchor="middle" font-size="14" font-weight="600" fill="#173404">Memory management — SQLite · local · fully offline</text>

  <rect x="56" y="1060" width="228" height="136" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="170" y="1082" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Working memory</text>
  <text x="170" y="1100" text-anchor="middle" font-size="11" fill="#0f6e56">current session only</text>
  <text x="170" y="1116" text-anchor="middle" font-size="11" fill="#0f6e56">active turns · KV cache state</text>
  <text x="170" y="1132" text-anchor="middle" font-size="11" fill="#0f6e56">arc position · scratchpad</text>
  <text x="170" y="1148" text-anchor="middle" font-size="11" fill="#0f6e56">cleared on session close</text>
  <text x="170" y="1164" text-anchor="middle" font-size="11" fill="#0f6e56">never persisted</text>

  <rect x="306" y="1060" width="228" height="136" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="420" y="1082" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">Atomic note store</text>
  <text x="420" y="1100" text-anchor="middle" font-size="11" fill="#3c3489">A-MEM Zettelkasten</text>
  <text x="420" y="1116" text-anchor="middle" font-size="11" fill="#3c3489">one fact per node</text>
  <text x="420" y="1132" text-anchor="middle" font-size="11" fill="#3c3489">emotion · arc · culture tags</text>
  <text x="420" y="1148" text-anchor="middle" font-size="11" fill="#3c3489">confidence tier per note</text>
  <text x="420" y="1164" text-anchor="middle" font-size="11" fill="#3c3489">permanent · confirmed only</text>

  <rect x="556" y="1060" width="228" height="136" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text x="670" y="1082" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Graph index</text>
  <text x="670" y="1100" text-anchor="middle" font-size="11" fill="#854f0b">HippoRAG</text>
  <text x="670" y="1116" text-anchor="middle" font-size="11" fill="#854f0b">spreading activation</text>
  <text x="670" y="1132" text-anchor="middle" font-size="11" fill="#854f0b">associative retrieval</text>
  <text x="670" y="1148" text-anchor="middle" font-size="11" fill="#854f0b">entity co-occurrence links</text>
  <text x="670" y="1164" text-anchor="middle" font-size="11" fill="#854f0b">BM25 + graph weights</text>

  <line x1="430" y1="1212" x2="430" y2="1236" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LAYER 7 — PUBLISHER -->
  <rect x="40" y="1236" width="780" height="60" rx="10" fill="#faece7" stroke="#993c1d" stroke-width="0.8"/>
  <text x="430" y="1258" text-anchor="middle" font-size="14" font-weight="600" fill="#4a1b0c">Publisher agent — memory book PDF</text>
  <text x="430" y="1278" text-anchor="middle" font-size="11" fill="#993c1d">narrative synthesis · chapter builder · Devanagari font · bilingual · printable · publish profile</text>

</svg>
